<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Sefirot Consulting LLC</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }

  .portal {
    max-width: 480px;
    width: 100%;
    text-align: center;
  }

  .mark {
    display: inline-flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 72px;
  }

  .mark-s {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #e0e0e0;
    border: 2px solid #e0e0e0;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .mark-text {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #888;
    line-height: 1.4;
    text-align: left;
  }

  .lines {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 64px;
  }

  .line-btn {
    display: block;
    width: 100%;
    padding: 18px 24px;
    background: transparent;
    border: 1px solid #333;
    color: #d0d0d0;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 14px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s;
  }

  .line-btn:hover {
    border-color: #888;
    color: #fff;
  }

  .contact {
    font-size: 12px;
    color: #555;
    letter-spacing: 0.05em;
  }

  .contact a {
    color: #666;
    text-decoration: none;
  }

  .contact a:hover {
    color: #999;
  }

  @media (max-width: 480px) {
    body { padding: 32px 16px; }
    .mark { margin-bottom: 48px; }
    .lines { margin-bottom: 48px; }
  }
</style>
</head>
<body>

<div class="portal">
  <div class="mark">
    <div class="mark-s">S</div>
    <div class="mark-text">Sefirot Consulting LLC</div>
  </div>

  <div class="lines">
    <a href="engage.html" class="line-btn">Event Operations</a>
    <a href="engage.html?line=advisory" class="line-btn">Advisory</a>
    <a href="engage.html?line=crisis" class="line-btn">Crisis Response</a>
  </div>

  <div class="contact">
    <a href="mailto:office@sefirotconsulting.com">office@sefirotconsulting.com</a>
  </div>
</div>

</body>
</html>
