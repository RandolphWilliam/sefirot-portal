<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sefirot Consulting LLC</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: #1a1a2e;
    color: #d0d0d0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }

  .mark {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 56px;
  }
  .mark-s {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #e0e0e0;
    border: 2px solid #e0e0e0;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .mark-text {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #888;
    line-height: 1.4;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 640px;
    width: 100%;
    margin-bottom: 56px;
  }

  .grid button {
    background: transparent;
    border: 1px solid #2a2a3e;
    color: #d0d0d0;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 13px;
    letter-spacing: 0.04em;
    padding: 20px 16px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    text-align: center;
    line-height: 1.4;
  }
  .grid button:hover {
    border-color: #4a5c4f;
    background: rgba(74, 92, 79, 0.08);
  }
  .grid button:focus-visible {
    outline: 2px solid #4a5c4f;
    outline-offset: 2px;
  }

  /* Last row: 2 buttons centered */
  .grid button:nth-child(10) {
    grid-column: 1 / 2;
  }
  .grid button:nth-child(11) {
    grid-column: 2 / 3;
  }

  .contact {
    font-size: 12px;
    color: #555;
    letter-spacing: 0.08em;
  }
  .contact a {
    color: #666;
    text-decoration: none;
  }
  .contact a:hover {
    color: #888;
  }

  @media (max-width: 600px) {
    .grid {
      grid-template-columns: 1fr 1fr;
    }
    .grid button:nth-child(10),
    .grid button:nth-child(11) {
      grid-column: auto;
    }
    body { padding: 32px 16px; }
  }

  @media (max-width: 380px) {
    .grid {
      grid-template-columns: 1fr;
    }
  }

  @media print {
    body { background: #fff; color: #1a1a1a; }
    .mark-s { color: #1a1a1a; border-color: #1a1a1a; }
    .mark-text { color: #444; }
    .grid button {
      border-color: #ccc;
      color: #1a1a1a;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .contact { color: #666; }
    .contact a { color: #333; }
  }
</style>
</head>
<body>

<div class="mark">
  <div class="mark-s">S</div>
  <div class="mark-text">Sefirot Consulting LLC</div>
</div>

<div class="grid">
  <button data-line="events" onclick="openNDA('events')">Event Operations</button>
  <button data-line="tech" onclick="openNDA('tech')">Institutional Technology</button>
  <button data-line="family-office" onclick="openNDA('family-office')">Family Office Services</button>
  <button data-line="brand" onclick="openNDA('brand')">Brand Development</button>
  <button data-line="crisis" onclick="openNDA('crisis')">Crisis &amp; Continuity</button>
  <button data-line="venue" onclick="openNDA('venue')">Venue &amp; Cultural Property</button>
  <button data-line="audit" onclick="openNDA('audit')">Audit &amp; Assurance</button>
  <button data-line="beverage" onclick="openNDA('beverage')">Beverage Architecture</button>
  <button data-line="speaking" onclick="openNDA('speaking')">Speaking &amp; Advisory</button>
  <button data-line="public-sector" onclick="openNDA('public-sector')">Public Sector &amp; Grants</button>
  <button data-line="investment" onclick="openNDA('investment')">Investment Facilitation</button>
</div>

<div class="contact">
  <a href="mailto:office@sefirotconsulting.com">office@sefirotconsulting.com</a>
</div>

<script>
(function() {
  // Check if already signed — go straight to engage
  window.openNDA = function(line) {
    localStorage.setItem('sefirot_selected_line', line);
    var signed = localStorage.getItem('sefirot_nda_signed');
    if (signed === 'true') {
      window.location.href = 'engage.html?line=' + line;
    } else {
      window.location.href = 'nda-sign.html?line=' + line;
    }
  };
})();
</script>

</body>
</html>
